<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO defaults (overridden by react-helmet-async per page) -->
    <title>Reeve Now — Your High Street, Booked</title>
    <meta name="description" content="Discover and book the best independent restaurants, salons, barbers, and spas across the UK. Zero commission. Real-time availability." />
    <meta name="theme-color" content="#1A2744" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://reevenow.com" />
    
    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Reeve Now" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:title" content="Reeve Now — Your High Street, Booked" />
    <meta property="og:description" content="Discover and book the best independent restaurants, salons, barbers, and spas across the UK." />
    <meta property="og:url" content="https://reevenow.com" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Leaflet Map (free, no API key) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
